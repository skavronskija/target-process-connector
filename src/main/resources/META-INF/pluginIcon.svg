<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Simplified Targetprocess Logo Style -->
  <!-- Central Node -->
  <circle cx="50" cy="50" r="12" fill="#AE304A"/>

  <!-- Connected Process Nodes (Simplified) -->
  <!-- Top Teal Node -->
  <path d="M50 10 L50 25" stroke="#106D65" stroke-width="6" stroke-linecap="round"/>
  <circle cx="50" cy="12" r="7" fill="#106D65"/>

  <!-- Bottom Yellow/Olive Node -->
  <path d="M50 75 L50 90" stroke="#B9BC63" stroke-width="6" stroke-linecap="round"/>
  <circle cx="50" cy="88" r="7" fill="#B9BC63"/>

  <!-- Right Blue Node -->
  <path d="M75 50 L90 50" stroke="#0093E5" stroke-width="6" stroke-linecap="round"/>
  <circle cx="88" cy="50" r="7" fill="#0093E5"/>

  <!-- Left Orange Node -->
  <path d="M10 50 L25 50" stroke="#E6961E" stroke-width="6" stroke-linecap="round"/>
  <circle cx="12" cy="50" r="7" fill="#E6961E"/>

  <!-- Diagonal Supporting Accents -->
  <circle cx="25" cy="25" r="5" fill="#649791"/>
  <circle cx="75" cy="75" r="5" fill="#F1CE4A"/>
  <circle cx="75" cy="25" r="5" fill="#91BEAF"/>
  <circle cx="25" cy="75" r="5" fill="#690E26"/>
</svg>